name: Feature request
description: Suggest an improvement or new source integration.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or UI you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or tradeoffs?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require shell command execution.
        - label: This does not require broad filesystem access.
        - label: This preserves official/community source labeling.

